services:
  backend:
    depends_on:
      - postgres
    image: backend-image
    container_name: backend-container
    build:
      context: ./backend
      dockerfile: .Dockerfile
    expose:
      - 5000
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    networks:
      - hackathon-network

  postgres:
    image: postgres:18
    container_name: postgres-container
    env_file:
      - ./backend/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker
    networks:
      - hackathon-network

  frontend:
    depends_on:
      - backend
    image: frontend-image
    container_name: frontend-container
    build:
      context: ./frontend
      dockerfile: ./.Dockerfile
    env_file:
      - ./frontend/.env
    expose:
      - 80
    ports:
      - "80:80"

networks:
  hackathon-network:
    driver: bridge
volumes:
  postgres_data: